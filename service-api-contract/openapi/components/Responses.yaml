components:
  responses:
    BadRequest_400:
      description: The request is invalid due to malformed syntax, missing required parameters, or invalid parameter values.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ValidationProblem"

    NotFound_404:
      description: The requested content could not be found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

    InternalServerError_500:
      description: An unexpected error occurred on the server while processing the request.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    ValidationProblem:
      type: object
      properties:
        problem:
          $ref: "#/components/schemas/Problem"
        validationErrors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

    Problem:
      type: object
      properties:
        type:
          type: string
        system:
          type: string
        title:
          type: string
        details:
          type: string

    ValidationError:
      type: object
      required:
        - field
        - code
      properties:
        field:
          type: string
          description: >
            The exact name of the request parameter or JSON property that
            failed validation (e.g. `email`, `departureDate`).
        code:
          type: string
          description: >
            A machine-readable identifier for the violated validation rule,
            such as `required`, `pattern`, `minLength`, or `format`.
        message:
          type: string
          description: >
            A human-readable explanation of why validation failed,
            including any constraint specifics
            (e.g. “must be at least 8 characters long” or
            “must be a valid ISO 8601 date”).
